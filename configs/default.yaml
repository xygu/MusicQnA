# Copy to configs/local.yaml and override paths.
#
# Hub 下载：未设置 HF_ENDPOINT 时，import musiccaps 会默认 HF_ENDPOINT=https://hf-mirror.com
# （见 musiccaps/hub_mirrors.py）。官方直连：export HF_ENDPOINT=https://huggingface.co

# --- Model ---
model_id: "Qwen/Qwen2.5-Omni-3B"
# Thinker-only checkpoint id (same Hub id; code loads ...ThinkerForConditionalGeneration)
dtype: "bfloat16"

# Debug: no GPU / no multimodal deps — uses tiny GPT2 + text-only chats (pipeline smoke test)
debug_use_mock_model: false

# --- LoRA (SFT & GRPO trainable adapter); set r: 0 to disable ---
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# --- Data ---
manifest_path: "./data/musiccaps_manifest.jsonl"
max_samples: null
# true: skip rows whose wav files are missing; false: fail fast with FileNotFoundError
skip_missing_wavs: true

# --- SFT ---
sft_epochs: 1
sft_batch_size: 1
sft_learning_rate: 1.0e-5
sft_max_grad_norm: 1.0
sft_log_every: 10
sft_save_every: 200

# --- GRPO ---
grpo_epochs: 1
grpo_batch_size: 1
grpo_group_size: 4
grpo_learning_rate: 5.0e-6
grpo_max_new_tokens: 128
grpo_temperature: 0.9
grpo_max_grad_norm: 1.0
grpo_log_every: 5
grpo_save_every: 100
# Reward = w_asp * aspect + w_clap * clap (each in [0,1])
reward_weight_aspect: 0.5
reward_weight_clap: 0.5
beta_kl: 0.02

# CLAP (HuggingFace laion checkpoint, music-tuned)
clap_model_id: "laion/larger_clap_music"
clap_batch_size: 2
# "cuda" | "cpu" | null (null = same as main device)
grpo_clap_device: null

# --- IO ---
checkpoint_dir: "./checkpoints"
sft_adapter_name: "sft_lora"
grpo_adapter_name: "grpo_lora"
# Continue GRPO from this adapter (usually sft_lora); null = train from base
grpo_init_adapter: "sft_lora"
seed: 42
